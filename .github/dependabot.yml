version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    commit-message:
      prefix: 'deps:'
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'
    ignore:
      - dependency-name: 'eslint'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@eslint/js'
        update-types:
          - 'version-update:semver-major'
    labels:
      - 'dependencies'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    commit-message:
      prefix: 'ci:'
    open-pull-requests-limit: 3
    labels:
      - 'ci'
